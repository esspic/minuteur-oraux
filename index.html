<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#fafaf9">
<title>Minuteur d'oraux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fafaf9; --txt:#1c1917; --muted:#78716c; --track:#eceae8;
  --green:#6ee7b7; --green-deep:#047857;
  --blue:#93c5fd;  --blue-deep:#1d4ed8;
  --coral:#fda4af; --coral-deep:#e11d48;
  --red:#f87171;   --red-deep:#dc2626;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; margin:0; }
body {
  background:var(--bg);
  color:var(--txt);
  font-family:'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  height:100dvh; overflow:hidden;
  touch-action:manipulation; user-select:none; -webkit-user-select:none;
}
body.flash { animation:bgflash 1.6s ease-in-out infinite; }
@keyframes bgflash { 0%,100% { background:#fff1f1; } 50% { background:#ffd9d9; } }
.screen { display:none; flex-direction:column; height:100%; }
.screen.active { display:flex; }

/* ---------- Barre de progression (haut) ---------- */
#progress {
  position:fixed; top:0; left:0; height:1.4vmin; width:100%;
  background:var(--track); z-index:5; display:none;
}
#progress .fill {
  height:100%; width:100%; border-radius:0 99px 99px 0;
  background:var(--green);
  transition:width .2s linear, background .4s;
}

/* ---------- Écran réglages ---------- */
#scr-config { padding:6vmin 6vmin; gap:5vmin; justify-content:center; align-items:center; }
h1 { font-size:6.5vmin; margin:0; text-align:center; font-weight:800; letter-spacing:-.03em; }
.subtitle { font-size:3.4vmin; color:var(--muted); margin-top:-3.5vmin; text-align:center; font-weight:500; }
.presets { display:flex; gap:3vmin; flex-wrap:wrap; justify-content:center; }
.preset {
  display:flex; flex-direction:column; align-items:center; gap:.8vmin;
  padding:3vmin 6vmin; cursor:pointer;
  background:transparent;
  border:2px solid var(--track); border-radius:99px;
  color:var(--txt);
  font-family:inherit;
  transition:border-color .15s, background .15s, transform .1s;
}
.preset:active { transform:scale(.97); }
.preset .big { font-size:5.5vmin; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
.preset .small { font-size:2.6vmin; color:var(--muted); font-weight:500; }
.preset.selected { border-color:var(--txt); background:var(--txt); }
.preset.selected .big { color:#fff; }
.preset.selected .small { color:#d6d3d1; }
.custom { display:flex; gap:5vmin; justify-content:center; }
.custom label { display:flex; flex-direction:column; align-items:center; gap:1.2vmin; font-size:3.2vmin; color:var(--muted); font-weight:500; }
.custom input {
  font-size:8vmin; font-weight:800; width:28vmin; text-align:center;
  background:transparent; color:var(--txt);
  border:none; border-bottom:3px solid var(--track); border-radius:0;
  padding:.5vmin 0 1vmin;
  font-family:inherit; font-variant-numeric:tabular-nums; outline:none;
  transition:border-color .15s;
}
.custom input:focus { border-bottom-color:var(--txt); }
#cfg-total { font-size:3.8vmin; color:var(--muted); font-weight:500; }
#cfg-total b { color:var(--txt); font-size:4.6vmin; font-weight:800; }

/* ---------- Écran minuteur : anneau type Time Timer ---------- */
#scr-timer { align-items:center; justify-content:space-between; padding:4.5vmin 4vmin 4vmin; }
#phase {
  display:flex; align-items:center; gap:2vmin;
  font-size:4.4vmin; font-weight:800; letter-spacing:.22em;
  color:var(--green-deep); margin-top:2.5vmin;
  transition:color .4s;
}
#phase::before {
  content:''; width:2vmin; height:2vmin; border-radius:50%;
  background:currentColor;
}
#scr-timer.entretien #phase { color:var(--blue-deep); }
#scr-timer.depasse  #phase { color:var(--coral-deep); }
#scr-timer.depasse  #phase::before { animation:blink 1s infinite; }
#scr-timer.ecoule   #phase { color:var(--red-deep); }
#scr-timer.ecoule   #phase::before { animation:blink .8s infinite; }
@keyframes blink { 50% { opacity:.15; } }

#clock {
  font-size:min(32vmin, 26vw); font-weight:800; line-height:1;
  font-variant-numeric:tabular-nums; letter-spacing:-.03em;
  color:var(--txt);
  transition:color .4s;
}
#scr-timer.depasse #clock { color:var(--coral-deep); }
#scr-timer.ecoule  #clock { color:var(--red-deep); }
#sub { font-size:3.6vmin; color:var(--muted); text-align:center; min-height:5.5vmin; font-weight:500; }

/* ---------- Écran récap ---------- */
#scr-recap { padding:6vmin; gap:5vmin; justify-content:center; align-items:center; }
.card { width:100%; max-width:120vmin; }
.recap-line { display:flex; justify-content:space-between; align-items:baseline;
  font-size:5.5vmin; padding:2.8vmin 0; border-bottom:2px solid var(--track); }
.recap-line .lbl { color:var(--muted); font-size:4vmin; font-weight:500; }
.recap-line .val { font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
.recap-line.total { border-bottom:none; font-size:7.5vmin; }
.recap-line.total .lbl { color:var(--txt); font-size:5vmin; font-weight:800; }
.recap-line .over { color:var(--red); font-size:4.2vmin; font-weight:600; }

/* ---------- Boutons ---------- */
.bigbtn {
  width:100%; max-width:120vmin; font-size:5.5vmin; font-weight:800;
  padding:4.5vmin; border:none; border-radius:99px;
  color:#fff; cursor:pointer; letter-spacing:-.01em;
  background:var(--txt);
  font-family:inherit;
  transition:transform .08s, opacity .15s;
}
.bigbtn:active { transform:scale(.98); opacity:.85; }
.bigbtn      { background:var(--blue); color:var(--blue-deep); }
.bigbtn.go   { background:var(--green); color:var(--green-deep); }
.bigbtn.warn { background:var(--coral); color:var(--coral-deep); }
.btnrow { display:flex; gap:3vmin; width:100%; max-width:120vmin; }
.btnrow .bigbtn.alt { background:transparent; color:var(--txt); border:2px solid var(--track); }
#btn-config-back {
  position:absolute; top:3vmin; left:3vmin; z-index:6;
  font-size:3.4vmin; font-weight:600; color:var(--muted); background:transparent;
  border:2px solid var(--track); border-radius:99px; padding:1.4vmin 3.5vmin; cursor:pointer;
  font-family:inherit;
}
#version { position:fixed; bottom:1vmin; right:2vmin; font-size:2.2vmin; color:#d6d3d1; z-index:6; }
</style>
</head>
<body>

<div id="progress"><div class="fill"></div></div>

<!-- Réglages -->
<div id="scr-config" class="screen active">
  <h1>Minuteur d'oraux</h1>
  <div class="subtitle">Exposé puis entretien — visuel uniquement, jamais de son</div>
  <div class="presets" id="presets"></div>
  <div class="custom">
    <label>Exposé (min)<input id="in-expose" type="number" inputmode="numeric" min="1" max="120" value="5"></label>
    <label>Entretien (min)<input id="in-entretien" type="number" inputmode="numeric" min="1" max="120" value="10"></label>
  </div>
  <div id="cfg-total"></div>
  <button class="bigbtn go" id="btn-ready">C'est parti</button>
</div>

<!-- Minuteur -->
<div id="scr-timer" class="screen">
  <button id="btn-config-back">← réglages</button>
  <div id="phase"></div>
  <div id="clock"></div>
  <div id="sub"></div>
  <button class="bigbtn" id="btn-main"></button>
</div>

<!-- Récapitulatif -->
<div id="scr-recap" class="screen">
  <h1>Récapitulatif</h1>
  <div class="card">
    <div class="recap-line"><span class="lbl">Exposé réel</span><span class="val" id="rc-expose"></span></div>
    <div class="recap-line"><span class="lbl">Entretien réel</span><span class="val" id="rc-entretien"></span></div>
    <div class="recap-line total"><span class="lbl">Total</span><span class="val" id="rc-total"></span></div>
  </div>
  <div class="btnrow">
    <button class="bigbtn alt" id="btn-recap-config">⚙ Réglages</button>
    <button class="bigbtn go" id="btn-next">Candidat suivant</button>
  </div>
</div>

<div id="version">v2026-06-11e</div>

<script>
'use strict';
const $ = id => document.getElementById(id);

const PRESETS = [
  { e: 5,  n: 10 },
  { e: 10, n: 30 },
];

// --- État ---
let cfg = { e: 5, n: 10 };          // minutes
let state = 'config';                // config | ready | expose | entretien | recap
let startExpose = 0, startEntretien = 0;
let realExpose = 0, realEntretien = 0; // secondes
let tickTimer = null;
let wakeLock = null;

// --- Utilitaires ---
function fmt(sec) {
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ':' + String(s).padStart(2, '0');
}
function totalSec() { return (cfg.e + cfg.n) * 60; }

// --- Barre de progression ---
const COLORS = { green:'#6ee7b7', blue:'#93c5fd', amber:'#fda4af', red:'#f87171' };
function setProgress(frac, color) {
  const f = $('progress').firstElementChild;
  f.style.width = (Math.max(0, Math.min(1, frac)) * 100) + '%';
  f.style.background = color;
}

// --- Wake Lock : écran allumé pendant l'oral ---
async function lockScreen() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
function unlockScreen() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && (state === 'expose' || state === 'entretien')) lockScreen();
});

// --- Écrans ---
function show(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('scr-' + name).classList.add('active');
  $('progress').style.display = (name === 'timer') ? 'block' : 'none';
}

// --- Réglages ---
function renderPresets() {
  const box = $('presets');
  box.innerHTML = '';
  PRESETS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'preset';
    b.innerHTML = '<span class="big">' + p.e + ' + ' + p.n + '</span>' +
                  '<span class="small">minutes · total ' + (p.e + p.n) + ' min</span>';
    if (p.e === cfg.e && p.n === cfg.n) b.classList.add('selected');
    b.onclick = () => {
      cfg = { e: p.e, n: p.n };
      $('in-expose').value = p.e;
      $('in-entretien').value = p.n;
      renderPresets(); renderTotal();
    };
    box.appendChild(b);
  });
}
function readInputs() {
  cfg.e = Math.max(1, parseInt($('in-expose').value, 10) || 1);
  cfg.n = Math.max(1, parseInt($('in-entretien').value, 10) || 1);
}
function renderTotal() {
  $('cfg-total').innerHTML = 'Temps total : <b>' + (cfg.e + cfg.n) + ' min</b>';
}
$('in-expose').oninput = $('in-entretien').oninput = () => { readInputs(); renderPresets(); renderTotal(); };

// --- Cycle de l'oral ---
function gotoReady() {
  state = 'ready';
  document.body.classList.remove('flash');
  $('scr-timer').className = 'screen active';
  $('phase').textContent = 'EXPOSÉ';
  $('clock').textContent = fmt(cfg.e * 60);
  $('sub').textContent = 'Exposé ' + cfg.e + ' min · entretien ' + cfg.n + ' min · total ' + (cfg.e + cfg.n) + ' min';
  $('btn-main').textContent = '▶ Démarrer l\'exposé';
  $('btn-main').className = 'bigbtn go';
  setProgress(1, COLORS.green);
  show('timer');
}

function mainAction() {
  if (state === 'ready') {
    state = 'expose';
    startExpose = Date.now();
    $('btn-main').textContent = 'Exposé terminé → entretien';
    $('btn-main').className = 'bigbtn';
    $('btn-config-back').style.display = 'none';
    lockScreen();
    tickTimer = setInterval(tick, 200);
    tick();
  } else if (state === 'expose') {
    realExpose = (Date.now() - startExpose) / 1000;
    state = 'entretien';
    startEntretien = Date.now();
    $('btn-main').textContent = '■ Terminer l\'oral';
    $('btn-main').className = 'bigbtn warn';
    tick();
  } else if (state === 'entretien') {
    realEntretien = (Date.now() - startEntretien) / 1000;
    endOral();
  }
}

function tick() {
  const now = Date.now();
  const scr = $('scr-timer');
  if (state === 'expose') {
    const elapsed = (now - startExpose) / 1000;
    const rem = cfg.e * 60 - elapsed;
    if (rem >= 0) {
      scr.className = 'screen active';
      $('phase').textContent = 'EXPOSÉ';
      $('clock').textContent = fmt(rem);
      $('sub').textContent = '';
      setProgress(rem / (cfg.e * 60), COLORS.green);
    } else {
      scr.className = 'screen active depasse';
      $('phase').textContent = 'EXPOSÉ — DÉPASSÉ';
      $('clock').textContent = '+' + fmt(-rem);
      $('sub').textContent = 'Temps d\'exposé prévu : ' + cfg.e + ' min';
      setProgress(0, COLORS.amber);
    }
  } else if (state === 'entretien') {
    const elapsed = (now - startEntretien) / 1000;
    const maxEntretien = totalSec() - realExpose;
    const rem = maxEntretien - elapsed;
    if (rem >= 0) {
      scr.className = 'screen active entretien';
      document.body.classList.remove('flash');
      $('phase').textContent = 'ENTRETIEN';
      $('clock').textContent = fmt(rem);
      $('sub').textContent = 'Exposé réel : ' + fmt(realExpose);
      setProgress(maxEntretien > 0 ? rem / maxEntretien : 0, COLORS.blue);
    } else {
      scr.className = 'screen active ecoule';
      document.body.classList.add('flash');
      $('phase').textContent = 'TEMPS ÉCOULÉ';
      $('clock').textContent = '+' + fmt(-rem);
      $('sub').textContent = 'Total prévu ' + (cfg.e + cfg.n) + ' min dépassé · exposé réel ' + fmt(realExpose);
      setProgress(0, COLORS.red);
    }
  }
}

function endOral() {
  state = 'recap';
  clearInterval(tickTimer); tickTimer = null;
  unlockScreen();
  document.body.classList.remove('flash');
  const totalReal = realExpose + realEntretien;
  $('rc-expose').textContent = fmt(realExpose);
  $('rc-entretien').textContent = fmt(realEntretien);
  const over = totalReal - totalSec();
  $('rc-total').innerHTML = fmt(totalReal) +
    (over > 0 ? ' <span class="over">(+' + fmt(over) + ')</span>' : '');
  show('recap');
}

// --- Boutons ---
$('btn-ready').onclick = () => { readInputs(); gotoReady(); };
$('btn-main').onclick = mainAction;
$('btn-config-back').onclick = () => { state = 'config'; show('config'); };
$('btn-next').onclick = () => { $('btn-config-back').style.display = ''; gotoReady(); };
$('btn-recap-config').onclick = () => { state = 'config'; $('btn-config-back').style.display = ''; show('config'); };

// Barre espace / Entrée = bouton principal (hors champs de saisie)
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (state === 'ready' || state === 'expose' || state === 'entretien') mainAction();
  }
});

// --- Init ---
renderPresets();
renderTotal();
</script>
</body>
</html>
